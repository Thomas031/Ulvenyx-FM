<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ulvenyx FM — Player</title>
  <style>
    :root {
      --bg: #070811;
      --panel: rgba(17, 19, 34, 0.86);
      --panel-2: rgba(255, 255, 255, 0.045);
      --text: #f7f3ea;
      --muted: #c8c2bd;
      --orange: #ff8a2a;
      --gold: #ffd38a;
      --blue: #4f7dff;
      --radius: 34px;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 138, 42, .18), transparent 30%),
        radial-gradient(circle at 78% 74%, rgba(79, 125, 255, .20), transparent 32%),
        linear-gradient(180deg, #0b0d18 0%, #070811 100%);
    }

    .radio-player {
      position: relative;
      width: min(100%, 520px);
      padding: 26px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(25, 25, 43, .92), rgba(8, 9, 17, .96));
      border: 1px solid rgba(255,255,255,.09);
      box-shadow:
        0 30px 90px rgba(0,0,0,.5),
        0 0 45px rgba(255,138,42,.12),
        0 0 45px rgba(79,125,255,.12);
      overflow: hidden;
    }

    .radio-player::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,138,42,.75), transparent 42%, rgba(79,125,255,.75));
      --webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .live-pill {
      position: absolute;
      top: 18px;
      right: 18px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 9px 13px;
      border-radius: 999px;
      background: rgba(6, 7, 14, .72);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(14px);
      font-size: .82rem;
      font-weight: 900;
      z-index: 3;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff613f;
      animation: blink 1.5s infinite;
    }

    .cover-wrap {
      position: relative;
      margin-bottom: 18px;
      border-radius: 28px;
      padding: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
    }

    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 22px;
      box-shadow: 0 22px 55px rgba(0,0,0,.42);
    }

    .player-content {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 16px;
    }

    .station-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .station-info h1 {
      margin: 0 0 6px;
      font-size: clamp(1.55rem, 5vw, 2.2rem);
      letter-spacing: -.04em;
      line-height: 1;
      background: linear-gradient(90deg, #fff5df 0%, var(--gold) 36%, var(--orange) 60%, #89a6ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .station-info p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: .96rem;
    }

    .wolf-badge {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(255,138,42,.16), rgba(79,125,255,.16));
      border: 1px solid rgba(255,211,138,.18);
      font-size: 1.55rem;
      flex: 0 0 auto;
    }

    .now {
      padding: 15px;
      border-radius: 22px;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.075);
    }

    .now small {
      display: block;
      color: var(--gold);
      text-transform: uppercase;
      font-size: .72rem;
      letter-spacing: .12em;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .now strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .now span {
      color: var(--muted);
      font-size: .9rem;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      cursor: pointer;
      color: white;
      font-weight: 900;
      transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
    }

    button:hover { transform: translateY(-2px); }

    .small-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.08);
    }

    .play-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      color: #160b04;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--gold), var(--orange));
      box-shadow: 0 16px 40px rgba(255,138,42,.3);
    }

    .volume {
      flex: 1 1 180px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 800;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--orange);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .badges span {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.07);
      color: var(--muted);
      font-size: .83rem;
      font-weight: 800;
    }

    @keyframes blink {
      0% { box-shadow: 0 0 0 0 rgba(255, 97, 63, .65); }
      70% { box-shadow: 0 0 0 12px rgba(255, 97, 63, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 97, 63, 0); }
    }
  </style>
</head>
<body>
  <section class="radio-player">
    <div class="live-pill"><span class="live-dot"></span> LIVE</div>

    <div class="cover-wrap">
      <img class="cover" src="https://i.ibb.co/rKWKycCW/Gh7-Xg-Modifie.webp" alt="Ulvenyx Roleplay" />
    </div>

    <div class="player-content">
      <div class="station-top">
        <div class="station-info">
          <h1>Ulvenyx FM</h1>
          <p>La radio officielle d'Ulvenyx Roleplay</p>
        </div>
        <div class="wolf-badge">🐺</div>
      </div>

      <div class="now">
        <small>En ce moment</small>
        <strong>Le direct Ulvenyx FM</strong>
        <span>Ambiance RP, flashs serveur et programmation premium.</span>
      </div>

      <div class="controls">
        <button class="small-btn" type="button">⏮</button>
        <button class="play-btn" id="playBtn" type="button">▶</button>
        <button class="small-btn" type="button">⏭</button>

        <div class="volume">
          <span>🔊</span>
          <input id="volume" type="range" min="0" max="100" value="72" />
        </div>
      </div>

      <div class="badges">
        <span>Live RP</span>
        <span>Flash serveur</span>
        <span>Night Wolf</span>
      </div>
    </div>

    <audio id="audio" preload="none">
      <!-- Remplace le lien vide par ton flux radio -->
      <source src="https://play.radioking.io/ulvenyx-fm" type="audio/mpeg" />
    </audio>
  </section>

  <script>
    const playBtn = document.getElementById('playBtn');
    const audio = document.getElementById('audio');
    const volume = document.getElementById('volume');

    audio.volume = volume.value / 100;

    volume.addEventListener('input', () => {
      audio.volume = volume.value / 100;
    });

    playBtn.addEventListener('click', async () => {
      const source = audio.querySelector('source').getAttribute('src');

      if (!source) {
        alert("Ajoute l'URL de ton flux radio dans la balise <source>.");
        return;
      }

      try {
        if (audio.paused) {
          await audio.play();
          playBtn.textContent = '❚❚';
        } else {
          audio.pause();
          playBtn.textContent = '▶';
        }
      } catch (error) {
        alert("Impossible de lancer le flux. Vérifie l'URL audio.");
      }
    });
  </script>
</body>
</html>
